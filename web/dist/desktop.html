<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#07110e" />
    <title>OpsPilot</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, "Noto Sans SC", system-ui, sans-serif; background: #050b09; color: #dce9e3; }
      * { box-sizing: border-box; }
      body { min-height: 100vh; margin: 0; display: grid; place-items: center; background: #050b09; }
      main { width: min(360px, calc(100vw - 48px)); display: grid; justify-items: center; gap: 18px; text-align: center; }
      .mark { width: 56px; height: 56px; display: grid; place-items: center; border-radius: 8px; background: #5df2a3; color: #06100c; font: 800 24px ui-monospace, monospace; }
      h1 { margin: 0; font-size: 22px; letter-spacing: 0; }
      p { margin: 0; color: #789087; font-size: 13px; }
      .bar { width: 180px; height: 3px; overflow: hidden; border-radius: 2px; background: #193027; }
      .bar::after { content: ""; display: block; width: 42%; height: 100%; background: #5df2a3; animation: loading 1.1s ease-in-out infinite alternate; }
      #error { display: none; color: #ff9494; line-height: 1.6; }
      @keyframes loading { from { transform: translateX(-100%); } to { transform: translateX(240%); } }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">&gt;_</div>
      <h1>OpsPilot</h1>
      <p id="status">正在启动本地服务...</p>
      <div class="bar" id="progress"></div>
      <p id="error"></p>
    </main>
    <script>
      document.addEventListener('contextmenu', function (event) { event.preventDefault() })
      if (!navigator.language.toLowerCase().startsWith('zh')) document.getElementById('status').textContent = 'Starting local service...'
      window.desktopStartupError = function (message) {
        document.getElementById('status').style.display = 'none'
        document.getElementById('progress').style.display = 'none'
        const error = document.getElementById('error')
        error.textContent = message
        error.style.display = 'block'
      }
    </script>
  </body>
</html>
