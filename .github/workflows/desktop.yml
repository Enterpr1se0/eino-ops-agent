name: Desktop packages

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/desktop.yml"
      - "cmd/**"
      - "internal/**"
      - "web/**"
      - "go.mod"
      - "go.sum"
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  package:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-22.04
            artifact: opspilot-linux-x64
            paths: |
              web/src-tauri/target/release/bundle/appimage/*.AppImage
              web/src-tauri/target/release/bundle/deb/*.deb
          - name: Windows x64
            os: windows-latest
            artifact: opspilot-windows-x64
            paths: web/src-tauri/target/release/bundle/nsis/*-setup.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: web/src-tauri -> target

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev libssl-dev patchelf

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Test Go backend
        run: go test ./...

      - name: Build desktop package
        run: npm run desktop:build
        working-directory: web

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.paths }}
          if-no-files-found: error
