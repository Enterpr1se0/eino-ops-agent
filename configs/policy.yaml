rules:
  - name: forbid-sensitive-files
    action: deny
    contains:
      - /etc/shadow
      - .ssh/id_rsa
      - .ssh/id_ed25519

  - name: require-approval-for-etc
    action: approval
    paths:
      - /etc

  - name: allow-readonly-container-inspection
    action: allow
    programs:
      - docker
    contains:
      - "docker ps"
      - "docker inspect"
      - "docker logs"
