listen_address: 0.0.0.0:8080
data_dir: .data
database_path: .data/ops-agent.db
policy_path: configs/policy.yaml

web_auth:
  # Set OPS_AGENT_ADMIN_PASSWORD for the first authenticated start. The
  # plaintext password is never persisted. Enable this when served over HTTPS.
  secure_cookies: false

# When workspaces is empty, OpsPilot creates this directory relative to its
# startup working directory and exposes it as read_write Workspace "default".
# Set it to "" to disable the automatic Workspace, or override it with
# OPS_AGENT_DEFAULT_WORKSPACE.
default_workspace_dir: workspace

# System settings choose Sandbox, Host Shell, or Disabled. Sandbox is the
# fail-safe default and requires this Bubblewrap binary on Linux; it never
# falls back to Host Shell. Override with OPS_AGENT_WORKSPACE_SANDBOX.
workspace_sandbox_path: bwrap

# Explicit absolute roots available to workspace_* tools. Defining one or more
# entries replaces the automatic default. These cannot be changed in Web.
workspaces: []
# Example:
#  - id: demo-app
#    root: /srv/opspilot-workspaces/demo-app
#    access: read_write

# Validators are argv templates, never shell snippets. {{path}} is substituted
# as one quoted remote argument or one local exec.Command argument.
validators:
  - id: nginx
    scope: remote
    program: nginx
    args: ["-t", "-c", "{{path}}"]
    timeout_seconds: 15
    path_patterns: ["/etc/nginx/**"]

logging:
  level: info # use debug for detailed HTTP, Agent, policy, and SSH lifecycle logs
  format: text # terminal format: text or json; the rotating file is always JSONL
  file: .data/ops-agent.log # set to "-" to disable file output
  add_source: false
  max_size_mb: 20
  max_backups: 3
  recent_limit: 2000 # in-memory entries available to the Web Logs page

ssh:
  default_known_hosts: .data/known_hosts

model:
  base_url: ""
  name: gpt-4o-mini

limits:
  sync_timeout_seconds: 60
  max_timeout_seconds: 600
  max_output_bytes: 10485760
  model_output_bytes: 32768
  global_concurrency: 8
  host_concurrency: 2
